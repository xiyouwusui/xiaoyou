name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Optional release tag to create/update. Leave empty to upload artifacts only.'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '22'
  PNPM_VERSION: '10.28.0'
  FLUTTER_VERSION: '3.38.7'
  ANDROID_BUILD_TOOLS_VERSION: '36.0.0'
  ANDROID_PLATFORM_VERSION: '36'
  ANDROID_CMAKE_VERSION: '3.22.1'
  NDK_VERSION: '28.2.13676358'
  ALLOWED_THIRD_PARTY_WRAPPER_SHA: 'ee3739525a995bcb5601621a6e2daec1f183bbefc375743acc235cec33547e04'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Resolve release reference
        id: release_ref
        shell: bash
        env:
          DISPATCH_TAG_NAME: ${{ inputs.tag_name }}
        run: |
          set -euo pipefail

          release_tag_name=""
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            release_tag_name="${GITHUB_REF_NAME}"
          elif [[ -n "${DISPATCH_TAG_NAME:-}" ]]; then
            release_tag_name="${DISPATCH_TAG_NAME#refs/tags/}"
          fi

          artifact_ref_name="${release_tag_name:-${GITHUB_REF_NAME}}"
          safe_ref_name="$(printf '%s' "${artifact_ref_name}" | sed 's#[^A-Za-z0-9._-]#-#g')"

          if [[ -z "${safe_ref_name}" ]]; then
            echo "Unable to derive a non-empty artifact reference name." >&2
            exit 1
          fi

          if [[ -n "${release_tag_name}" && "${release_tag_name}" =~ [[:space:]] ]]; then
            echo "Release tag name must not contain whitespace: ${release_tag_name}" >&2
            exit 1
          fi

          echo "artifact_ref_name=${artifact_ref_name}" >> "$GITHUB_OUTPUT"
          echo "safe_ref_name=${safe_ref_name}" >> "$GITHUB_OUTPUT"
          echo "release_tag_name=${release_tag_name}" >> "$GITHUB_OUTPUT"

          if [[ -n "${release_tag_name}" ]]; then
            echo "publish_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine release mode
        id: release_mode
        shell: bash
        env:
          RELEASE_REF_NAME: ${{ steps.release_ref.outputs.artifact_ref_name }}
        run: |
          set -euo pipefail

          normalized_ref="${RELEASE_REF_NAME#v}"
          if [[ "$normalized_ref" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "track=beta" >> "$GITHUB_OUTPUT"
            echo "draft=false" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          elif [[ "$normalized_ref" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "track=stable" >> "$GITHUB_OUTPUT"
            echo "draft=false" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "track=custom" >> "$GITHUB_OUTPUT"
            echo "draft=true" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare artifact directory
        id: artifacts
        shell: bash
        env:
          SAFE_REF_NAME: ${{ steps.release_ref.outputs.safe_ref_name }}
        run: |
          set -euo pipefail

          release_asset_dir="${RUNNER_TEMP}/release-artifacts/${SAFE_REF_NAME}"
          mkdir -p "${release_asset_dir}"
          echo "dir=${release_asset_dir}" >> "$GITHUB_OUTPUT"
          echo "RELEASE_ASSET_DIR=${release_asset_dir}" >> "$GITHUB_ENV"
          echo "SAFE_REF_NAME=${SAFE_REF_NAME}" >> "$GITHUB_ENV"

      - name: Free runner disk space
        shell: bash
        run: |
          set -euo pipefail

          df -h
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost /usr/local/lib/android/sdk/ndk/* || true
          if [[ -n "${AGENT_TOOLSDIRECTORY:-}" ]]; then
            sudo rm -rf "${AGENT_TOOLSDIRECTORY}/CodeQL" || true
          fi
          df -h

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: webchat/pnpm-lock.yaml

      - name: Validate Gradle wrappers
        uses: gradle/actions/wrapper-validation@v4
        with:
          allow-checksums: ${{ env.ALLOWED_THIRD_PARTY_WRAPPER_SHA }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Android SDK release packages
        id: cache-android-sdk
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
            ${{ env.ANDROID_SDK_ROOT }}/platforms/android-${{ env.ANDROID_PLATFORM_VERSION }}
            ${{ env.ANDROID_SDK_ROOT }}/build-tools/${{ env.ANDROID_BUILD_TOOLS_VERSION }}
            ${{ env.ANDROID_SDK_ROOT }}/cmake/${{ env.ANDROID_CMAKE_VERSION }}
            ${{ env.ANDROID_SDK_ROOT }}/licenses
          key: ${{ runner.os }}-android-release-sdk-${{ env.NDK_VERSION }}-${{ env.ANDROID_PLATFORM_VERSION }}-${{ env.ANDROID_BUILD_TOOLS_VERSION }}-${{ env.ANDROID_CMAKE_VERSION }}

      - name: Ensure required Android SDK components
        shell: bash
        run: |
          set -euo pipefail

          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          license_status=$?
          set -o pipefail

          if [[ "$license_status" -ne 0 ]]; then
            echo "sdkmanager --licenses failed with exit code ${license_status}" >&2
            exit "$license_status"
          fi

          declare -a MISSING_PACKAGES=()

          if [[ ! -d "$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" ]]; then
            MISSING_PACKAGES+=("ndk;${{ env.NDK_VERSION }}")
          fi

          if [[ ! -d "$ANDROID_SDK_ROOT/platforms/android-${{ env.ANDROID_PLATFORM_VERSION }}" ]]; then
            MISSING_PACKAGES+=("platforms;android-${{ env.ANDROID_PLATFORM_VERSION }}")
          fi

          if [[ ! -d "$ANDROID_SDK_ROOT/build-tools/${{ env.ANDROID_BUILD_TOOLS_VERSION }}" ]]; then
            MISSING_PACKAGES+=("build-tools;${{ env.ANDROID_BUILD_TOOLS_VERSION }}")
          fi

          if [[ ! -d "$ANDROID_SDK_ROOT/cmake/${{ env.ANDROID_CMAKE_VERSION }}" ]]; then
            MISSING_PACKAGES+=("cmake;${{ env.ANDROID_CMAKE_VERSION }}")
          fi

          if (( ${#MISSING_PACKAGES[@]} == 0 )); then
            echo "Required Android SDK components are already installed."
            exit 0
          fi

          echo "Installing missing Android SDK components:"
          printf '%s\n' "${MISSING_PACKAGES[@]}"
          sdkmanager "${MISSING_PACKAGES[@]}"

      - name: Export Android NDK environment
        shell: bash
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> "$GITHUB_ENV"

      - name: Decode release keystore
        shell: bash
        env:
          RELEASE_KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          set -euo pipefail

          if [[ -z "${RELEASE_KEYSTORE_B64}" ]]; then
            echo "Missing RELEASE_KEYSTORE secret." >&2
            exit 1
          fi

          printf '%s' "${RELEASE_KEYSTORE_B64}" | base64 --decode > "${RUNNER_TEMP}/release.jks"
          chmod 600 "${RUNNER_TEMP}/release.jks"

      - name: Build production release APKs
        shell: bash
        env:
          RELEASE_REF_NAME: ${{ steps.release_ref.outputs.artifact_ref_name }}
          RELEASE_ASSET_DIR: ${{ steps.artifacts.outputs.dir }}
          GRADLE_OPTS: >-
            -Dorg.gradle.jvmargs=-Xmx5g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8 --enable-native-access=ALL-UNNAMED
          OMNI_RELEASE_STORE_FILE: ${{ runner.temp }}/release.jks
          OMNI_RELEASE_STORE_PWD: ${{ secrets.RELEASE_PASSWORD }}
          OMNI_RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          OMNI_RELEASE_KEY_PWD: ${{ secrets.RELEASE_PASSWORD }}
        run: |
          set -euo pipefail

          bash scripts/build-local-release.sh \
            --edition standard \
            --tag "${RELEASE_REF_NAME}" \
            --out-dir "${RELEASE_ASSET_DIR}" \
            --non-interactive

      - name: Verify release artifacts
        shell: bash
        env:
          RELEASE_ASSET_DIR: ${{ steps.artifacts.outputs.dir }}
          SAFE_REF_NAME: ${{ steps.release_ref.outputs.safe_ref_name }}
        run: |
          set -euo pipefail

          test -f "${RELEASE_ASSET_DIR}/OpenOmniBot-${SAFE_REF_NAME}-standard.apk"
          test -f "${RELEASE_ASSET_DIR}/OpenOmniBot-${SAFE_REF_NAME}-standard.apk.sha256"
          test -f "${RELEASE_ASSET_DIR}/manifest.txt"
          find "${RELEASE_ASSET_DIR}" -maxdepth 1 -type f -print | sort

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ steps.release_ref.outputs.safe_ref_name }}
          if-no-files-found: error
          path: |
            ${{ steps.artifacts.outputs.dir }}/*.apk
            ${{ steps.artifacts.outputs.dir }}/*.sha256
            ${{ steps.artifacts.outputs.dir }}/manifest.txt

      - name: Create GitHub Release
        if: steps.release_ref.outputs.publish_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_ref.outputs.release_tag_name }}
          target_commitish: ${{ github.sha }}
          draft: ${{ steps.release_mode.outputs.draft == 'true' }}
          prerelease: ${{ steps.release_mode.outputs.prerelease == 'true' }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            ${{ steps.artifacts.outputs.dir }}/OpenOmniBot-${{ steps.release_ref.outputs.safe_ref_name }}-standard.apk
            ${{ steps.artifacts.outputs.dir }}/OpenOmniBot-${{ steps.release_ref.outputs.safe_ref_name }}-standard.apk.sha256
            ${{ steps.artifacts.outputs.dir }}/manifest.txt

      - name: Upload APKs to Cloudflare R2 via Worker
        if: steps.release_ref.outputs.publish_release == 'true'
        shell: bash
        env:
          APP_UPDATE_WORKER_URL: ${{ secrets.APP_UPDATE_WORKER_URL }}
          APP_UPDATE_WORKER_TOKEN: ${{ secrets.APP_UPDATE_WORKER_TOKEN }}
          RELEASE_TAG_NAME: ${{ steps.release_ref.outputs.release_tag_name }}
          RELEASE_ASSET_DIR: ${{ steps.artifacts.outputs.dir }}
          SAFE_REF_NAME: ${{ steps.release_ref.outputs.safe_ref_name }}
        run: |
          set -euo pipefail

          if [[ -z "${APP_UPDATE_WORKER_URL}" || -z "${APP_UPDATE_WORKER_TOKEN}" ]]; then
            echo "APP_UPDATE_WORKER_URL and APP_UPDATE_WORKER_TOKEN secrets are required to upload APKs." >&2
            exit 1
          fi

          PYTHON_BIN=python3
          if command -v python3.11 >/dev/null 2>&1; then
            PYTHON_BIN=python3.11
          fi

          for edition in standard; do
            apk_path="${RELEASE_ASSET_DIR}/OpenOmniBot-${SAFE_REF_NAME}-${edition}.apk"
            sha_path="${apk_path}.sha256"
            sha256="$(awk '{print $1}' "${sha_path}")"
            sha_file_sha256="$(sha256sum "${sha_path}" | awk '{print $1}')"

            "${PYTHON_BIN}" scripts/upload_release_asset_to_worker.py \
              --worker-url "${APP_UPDATE_WORKER_URL}" \
              --token "${APP_UPDATE_WORKER_TOKEN}" \
              --tag "${RELEASE_TAG_NAME}" \
              --file "${apk_path}" \
              --content-type "application/vnd.android.package-archive" \
              --sha256 "${sha256}"

            "${PYTHON_BIN}" scripts/upload_release_asset_to_worker.py \
              --worker-url "${APP_UPDATE_WORKER_URL}" \
              --token "${APP_UPDATE_WORKER_TOKEN}" \
              --tag "${RELEASE_TAG_NAME}" \
              --file "${sha_path}" \
              --content-type "text/plain; charset=utf-8" \
              --sha256 "${sha_file_sha256}"
          done

      - name: Publish release tag to Cloudflare Worker
        if: steps.release_ref.outputs.publish_release == 'true'
        shell: bash
        env:
          APP_UPDATE_WORKER_URL: ${{ secrets.APP_UPDATE_WORKER_URL }}
          APP_UPDATE_WORKER_TOKEN: ${{ secrets.APP_UPDATE_WORKER_TOKEN }}
          RELEASE_TAG_NAME: ${{ steps.release_ref.outputs.release_tag_name }}
          RELEASE_TRACK: ${{ steps.release_mode.outputs.track }}
          RELEASE_DRAFT: ${{ steps.release_mode.outputs.draft }}
          RELEASE_PRERELEASE: ${{ steps.release_mode.outputs.prerelease }}
          RELEASE_ASSET_DIR: ${{ steps.artifacts.outputs.dir }}
          SAFE_REF_NAME: ${{ steps.release_ref.outputs.safe_ref_name }}
        run: |
          set -euo pipefail

          if [[ -z "${APP_UPDATE_WORKER_URL}" || -z "${APP_UPDATE_WORKER_TOKEN}" ]]; then
            echo "APP_UPDATE_WORKER_URL and APP_UPDATE_WORKER_TOKEN secrets are required to publish update metadata." >&2
            exit 1
          fi

          PYTHON_BIN=python3
          if command -v python3.11 >/dev/null 2>&1; then
            PYTHON_BIN=python3.11
          fi

          payload_file="${RUNNER_TEMP}/app-update-worker-payload.json"
          "${PYTHON_BIN}" - <<'PY' > "${payload_file}"
          import json
          import os
          import time
          from pathlib import Path

          tag = os.environ["RELEASE_TAG_NAME"]
          safe_ref = os.environ["SAFE_REF_NAME"]
          github_repo = os.environ["GITHUB_REPOSITORY"]
          asset_dir = Path(os.environ["RELEASE_ASSET_DIR"])

          def env_bool(name):
              return os.environ.get(name, "").lower() == "true"

          def apk_asset(edition):
              name = f"OpenOmniBot-{safe_ref}-{edition}.apk"
              apk_path = asset_dir / name
              sha256 = (asset_dir / f"{name}.sha256").read_text(encoding="utf-8").split()[0]
              return {
                  "name": name,
                  "githubDownloadUrl": f"https://github.com/{github_repo}/releases/download/{tag}/{name}",
                  "sha256": sha256,
                  "size": apk_path.stat().st_size,
              }

          payload = {
              "tag": tag,
              "track": os.environ["RELEASE_TRACK"],
              "draft": env_bool("RELEASE_DRAFT"),
              "prerelease": env_bool("RELEASE_PRERELEASE"),
              "publishedAt": int(time.time() * 1000),
              "releaseUrl": f"https://github.com/{github_repo}/releases/tag/{tag}",
              # releaseNotes is intentionally omitted: the worker keeps the
              # changelog curated in the admin console (/admin) across republishes.
              "assets": [
                  apk_asset("standard"),
              ],
          }
          print(json.dumps(payload, ensure_ascii=False))
          PY

          api_url="${APP_UPDATE_WORKER_URL%/}"
          api_url="${api_url%/updates}"
          api_url="${api_url%/admin/releases}/admin/releases"

          curl --fail --show-error --silent --location \
            --request POST "${api_url}" \
            --header "Authorization: Bearer ${APP_UPDATE_WORKER_TOKEN}" \
            --header "Content-Type: application/json" \
            --data-binary @"${payload_file}"
