<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Omnibot Web Chat">
  <title>Omnibot Web Chat</title>

  <link rel="preload" as="font" type="font/woff2" href="fonts/OmnibotWebCjk.woff2" crossorigin="anonymous">
  <link rel="preload" as="font" type="font/otf" href="assets/assets/fonts/OmnibotWebCjk.otf" crossorigin="anonymous">

  <style>
    @font-face {
      font-family: 'OmnibotWebCjk';
      font-style: normal;
      font-weight: 400;
      font-display: block;
      src: url('fonts/OmnibotWebCjk.woff2') format('woff2');
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #F4F7FC;
      color: #353E53;
      font-family: 'OmnibotWebCjk', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', 'Noto Sans CJK SC', 'WenQuanYi Micro Hei', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    #omnibot-boot {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F4F7FC;
      z-index: 9999;
      transition: opacity 280ms ease-out;
    }

    #omnibot-boot[data-hidden="true"] {
      opacity: 0;
      pointer-events: none;
    }

    #omnibot-boot .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      padding: 28px 36px;
      border-radius: 20px;
      background: #F9FCFF;
      border: 1px solid #D9E6FB;
      box-shadow: 0 16px 48px rgba(19, 38, 72, 0.06);
      font-family: inherit;
    }

    #omnibot-boot .dot-row {
      display: flex;
      gap: 8px;
    }

    #omnibot-boot .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4F83FF;
      opacity: 0.4;
      animation: omnibot-bounce 1s infinite ease-in-out;
    }

    #omnibot-boot .dot:nth-child(2) { animation-delay: 0.15s; }
    #omnibot-boot .dot:nth-child(3) { animation-delay: 0.3s; }

    #omnibot-boot .title {
      font-size: 14px;
      font-weight: 500;
      color: #353E53;
      letter-spacing: 0.33px;
    }

    #omnibot-boot .hint {
      font-size: 12px;
      color: #617390;
      letter-spacing: 0.33px;
    }

    @keyframes omnibot-bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.35; }
      40% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="omnibot-boot">
    <div class="card">
      <div class="dot-row">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <div class="title">正在连接本机服务</div>
      <div class="hint">Loading Omnibot Web Chat...</div>
    </div>
  </div>

  <script>
    // Hide loading screen as soon as Flutter renders its first frame.
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('omnibot-boot');
      if (!el) return;
      el.setAttribute('data-hidden', 'true');
      setTimeout(function () { el.remove(); }, 320);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
